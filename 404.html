<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Race Mind</title>
  <meta name="description" content="Join Race Mind and connect with your friends. AI-powered training coach for endurance athletes.">
  <link rel="icon" type="image/png" href="/favicon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Lexend+Deca:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --primary: #FF8A00;
      --primary-dark: #FF6B00;
      --secondary: #00D1FF;
      --bg: #050505;
      --surface: #111111;
      --card: #1A1C1E;
      --muted: #949494;
      --foreground: #FFFFFF;
      --radius: 1rem;
    }

    body {
      font-family: 'Lexend Deca', system-ui, -apple-system, sans-serif;
      background: var(--bg);
      color: var(--foreground);
      min-height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
      -webkit-font-smoothing: antialiased;
    }

    .card {
      max-width: 400px;
      width: 100%;
      margin: 1.5rem;
      padding: 2.5rem 2rem;
      background: var(--card);
      border-radius: var(--radius);
      border: 1px solid rgba(255, 255, 255, 0.06);
      text-align: center;
    }

    .logo {
      width: 64px;
      height: 64px;
      margin: 0 auto 1.5rem;
    }

    .title {
      font-size: 1.5rem;
      font-weight: 700;
      margin-bottom: 0.5rem;
    }

    .gradient-text {
      background: linear-gradient(135deg, var(--primary), var(--secondary));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .subtitle {
      color: var(--muted);
      font-size: 0.9rem;
      font-weight: 300;
      line-height: 1.5;
      margin-bottom: 2rem;
    }

    .friend-code {
      font-size: 1.75rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      margin-bottom: 2rem;
      padding: 1rem;
      background: var(--surface);
      border-radius: var(--radius);
    }

    .store-buttons {
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
    }

    .store-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      padding: 0.875rem 1.5rem;
      border-radius: var(--radius);
      font-family: inherit;
      font-size: 0.95rem;
      font-weight: 600;
      text-decoration: none;
      transition: opacity 0.2s;
    }

    .store-btn:hover { opacity: 0.85; }

    .store-btn--ios {
      background: var(--foreground);
      color: var(--bg);
    }

    .store-btn--android {
      background: var(--surface);
      color: var(--foreground);
      border: 1px solid rgba(255, 255, 255, 0.1);
    }

    .store-icon {
      width: 22px;
      height: 22px;
    }

    .footer-text {
      margin-top: 1.5rem;
      font-size: 0.75rem;
      color: var(--muted);
      font-weight: 300;
    }

    .footer-text a {
      color: var(--primary);
      text-decoration: none;
    }

    .back-link {
      display: inline-block;
      margin-top: 1.5rem;
      color: var(--primary);
      text-decoration: none;
      font-size: 0.9rem;
      font-weight: 500;
    }

    .back-link:hover { opacity: 0.85; }
  </style>
</head>
<body>
  <!-- Friend invite view (hidden by default) -->
  <div class="card" id="friendView" style="display: none;">
    <img src="/favicon.png" alt="Race Mind" class="logo">
    <h1 class="title"><span class="gradient-text">Race Mind</span></h1>
    <p class="subtitle">
      You've been invited to connect on Race Mind &ndash; the AI training coach for endurance athletes.
    </p>
    <div class="friend-code" id="friendCode"></div>
    <div class="store-buttons">
      <a href="https://race-mind.com" class="store-btn store-btn--ios">
        <svg class="store-icon" viewBox="0 0 24 24" fill="currentColor"><path d="M18.71 19.5c-.83 1.24-1.71 2.45-3.05 2.47-1.34.03-1.77-.79-3.29-.79-1.53 0-2 .77-3.27.82-1.31.05-2.3-1.32-3.14-2.53C4.25 17 2.94 12.45 4.7 9.39c.87-1.52 2.43-2.48 4.12-2.51 1.28-.02 2.5.87 3.29.87.78 0 2.26-1.07 3.8-.91.65.03 2.47.26 3.64 1.98-.09.06-2.17 1.28-2.15 3.81.03 3.02 2.65 4.03 2.68 4.04-.03.07-.42 1.44-1.38 2.83M13 3.5c.73-.83 1.94-1.46 2.94-1.5.13 1.17-.34 2.35-1.04 3.19-.69.85-1.83 1.51-2.95 1.42-.15-1.15.41-2.35 1.05-3.11z"/></svg>
        App Store
      </a>
      <a href="https://race-mind.com" class="store-btn store-btn--android">
        <svg class="store-icon" viewBox="0 0 24 24" fill="currentColor"><path d="M3.609 1.814L13.792 12 3.61 22.186a.996.996 0 0 1-.61-.92V2.734a1 1 0 0 1 .609-.92zm10.89 10.893l2.302 2.302-10.937 6.333 8.635-8.635zm3.199-3.199l2.302 2.302a1 1 0 0 1 0 1.38l-2.302 2.302L15.197 12l2.501-2.492zM5.864 2.658L16.8 9.49l-2.302 2.302-8.634-8.634z"/></svg>
        Google Play
      </a>
    </div>
    <p class="footer-text">
      <a href="/">race-mind.com</a>
    </p>
  </div>

  <!-- Generic 404 view (hidden by default) -->
  <div class="card" id="notFoundView" style="display: none;">
    <img src="/favicon.png" alt="Race Mind" class="logo">
    <h1 class="title"><span class="gradient-text">Page not found</span></h1>
    <p class="subtitle">
      The page you're looking for doesn't exist.
    </p>
    <a href="/" class="back-link">Back to race-mind.com</a>
  </div>

  <script>
    var path = window.location.pathname;
    var parts = path.split('/').filter(Boolean);
    var friendIndex = parts.indexOf('friend');

    if (friendIndex >= 0 && parts[friendIndex + 1]) {
      // Friend invite route: /friend/{code}
      var code = parts[friendIndex + 1];
      var display = code.replace(/(\d+)$/, '#$1');
      document.getElementById('friendCode').textContent = display;
      document.getElementById('friendView').style.display = '';

      // Try to open the app via custom URL scheme
      var appUrl = 'racemind://friend/' + code;
      var timeout = setTimeout(function() {
        // App didn't open — user stays on this page
      }, 1500);

      window.addEventListener('pagehide', function() {
        clearTimeout(timeout);
      });

      window.location.href = appUrl;
    } else {
      // Generic 404
      document.getElementById('notFoundView').style.display = '';
    }
  </script>
</body>
</html>
